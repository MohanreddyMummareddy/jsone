<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jsone Table Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'VS Code Font', Roboto, sans-serif;
      background: var(--vscode-editor-background);
      color: var(--vscode-editor-foreground);
      height: 100vh;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: var(--vscode-sideBar-background);
      border-bottom: 1px solid var(--vscode-sideBar-border);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type='text'] {
      flex: 1;
      min-width: 200px;
      padding: 6px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 3px;
      font-size: 13px;
    }

    button {
      padding: 6px 12px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--vscode-button-hoverBackground);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: var(--vscode-list-hoverBackground);
      position: sticky;
      top: 0;
    }

    th {
      padding: 8px;
      text-align: left;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-bottom: 1px solid var(--vscode-list-focusOutline);
    }

    th:hover {
      background: var(--vscode-commandCenter-border);
    }

    tbody tr:hover {
      background: var(--vscode-list-hoverBackground);
    }

    td {
      padding: 8px;
      border-bottom: 1px solid var(--vscode-list-focusOutline);
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--vscode-descriptionForeground);
    }

    .error {
      padding: 12px;
      background: var(--vscode-notificationCenterHeader-background);
      color: var(--vscode-errorForeground);
      border-radius: 3px;
      margin: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button id="copyCSVBtn">Copy CSV</button>
      <button id="toggleTreeBtn">Tree View</button>
    </div>

    <div class="content">
      <div id="tableContainer" class="table-wrapper">
        <div class="empty-state">📊 Loading...</div>
      </div>
    </div>
  </div>

  <!-- DATA_PLACEHOLDER -->

  <script>
    const vscode = acquireVsCodeApi();

    function parseAndRenderTable() {
      try {
        if (typeof jsoneData === 'undefined') {
          document.getElementById('tableContainer').innerHTML =
            '<div class="empty-state">No data loaded</div>';
          return;
        }

        // Dynamically import core library and render
        // For now, show the parsed data
        const parsed = JSON.parse(jsoneData);
        const container = document.getElementById('tableContainer');

        // Simple table rendering
        if (Array.isArray(parsed.data)) {
          if (parsed.data.length === 0) {
            container.innerHTML = '<div class="empty-state">No rows</div>';
            return;
          }

          const firstRow = parsed.data[0];
          const keys = Object.keys(firstRow);

          let html = '<table><thead><tr>';
          keys.forEach((key) => {
            html += `<th>${key}</th>`;
          });
          html += '</tr></thead><tbody>';

          parsed.data.forEach((row) => {
            html += '<tr>';
            keys.forEach((key) => {
              const value = row[key];
              const display = String(value).substring(0, 50);
              html += `<td>${display}</td>`;
            });
            html += '</tr>';
          });

          html += '</tbody></table>';
          container.innerHTML = html;
        } else {
          container.innerHTML = '<div class="empty-state">No table data</div>';
        }
      } catch (err) {
        document.getElementById('tableContainer').innerHTML =
          `<div class="error">Error: ${err.message}</div>`;
      }
    }

    // Initialize
    window.addEventListener('load', parseAndRenderTable);

    // Handle file updates
    window.addEventListener('message', (event) => {
      if (event.data.command === 'update') {
        jsoneData = event.data.data;
        parseAndRenderTable();
      }
    });

    // Button handlers
    document.getElementById('copyCSVBtn').addEventListener('click', () => {
      vscode.postMessage({
        command: 'copyCSV',
        csv: 'csv,data,here',
      });
    });

    document.getElementById('toggleTreeBtn').addEventListener('click', () => {
      vscode.postMessage({
        command: 'toggleTree',
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      // Implement search
    });
  </script>
</body>
</html>
